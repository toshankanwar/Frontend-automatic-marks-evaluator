<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline | AutoGrade</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border: 1px solid #d1fae5;
      border-radius: 16px;
      padding: 24px;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    h1 { margin: 0 0 8px; color: #047857; }
    p { margin: 0; color: #334155; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You are offline</h1>
    <p>AutoGrade is not connected right now. Please check your internet and try again.</p>
  </div>
</body>
</html>
